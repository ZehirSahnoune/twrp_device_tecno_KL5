name: Build TWRP
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt update
          sudo apt install gperf gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses6 lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc python3 -y

      - name: Install Repo and Sync Source
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH
          mkdir twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all)

      - name: Build Recovery
        run: |
          export PATH=~/bin:$PATH
          # إنشاء المجلدات اللازمة وبدء عملية النسخ الذكي لتجنب خطأ التكرار
          mkdir -p twrp/device/tecno/KL5
          find . -maxdepth 1 -not -name 'twrp' -not -name '.' -exec cp -r {} twrp/device/tecno/KL5/ \;
          cd twrp
          source build/envsetup.sh
          lunch twrp_KL5-eng
          mka recoveryimage -j$(nproc --all)

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-KL5-Built
          path: twrp/out/target/product/KL5/recovery.img
